<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Futbol Oyunu</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }
    canvas {
      display: block;
    }
    #overlay, #gameover {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    #overlay.hidden, #gameover.hidden {
      display: none;
    }
    #score, #clock {
      position: absolute;
      top: 10px;
      background: rgba(0,0,0,0.5);
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 18px;
      color: #fff;
      z-index: 5;
    }
    #score { left: 10px; }
    #clock { right: 10px; }
    button {
      padding: 12px 24px;
      font-size: 18px;
      border-radius: 10px;
      background-color: #ffffff;
      color: #000;
      border: none;
      cursor: pointer;
    }
    #mobile-controls {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
      z-index: 10;
    }
    .circle {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: white;
      color: black;
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div id="overlay">
    <h1>3D Futbol Oyunu</h1>
    <button id="startBtn">Oyuna Başla</button>
  </div>
  <div id="gameover" class="hidden">
    <h1>Oyun Bitti</h1>
    <p id="result"></p>
    <button onclick="window.location.reload()">Tekrar Oyna</button>
  </div>
  <div id="score">Sen: 0 - AI: 0</div>
  <div id="clock">60</div>
  <div id="mobile-controls">
    <div class="circle" ontouchstart="move.left=true" ontouchend="move.left=false">⯇</div>
    <div class="circle" ontouchstart="move.right=true" ontouchend="move.right=false">⯈</div>
    <div class="circle" ontouchstart="move.forward=true" ontouchend="move.forward=false">▲</div>
    <div class="circle" ontouchstart="kickBall()">⚽</div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three';
    import * as CANNON from 'https://cdn.skypack.dev/cannon-es';

    let scene, camera, renderer, world;
    let player, ai, ball;
    let score = { player: 0, ai: 0 };
    let timeLeft = 60;
    let move = { left: false, right: false, forward: false };
    let animationId;
    const GOAL_LINE_X = 24; // Saha kenar çizgisi x koordinatı

    document.getElementById('startBtn').addEventListener('click', () => {
      document.getElementById('overlay').classList.add('hidden');
      init();
      animate();
      startTimer();
    });

    function createGoalPost(width, height, depth, color = 0xffffff) {
        const geometry = new THREE.BoxGeometry(width, height, depth);
        const material = new THREE.MeshStandardMaterial({ color: color });
        return new THREE.Mesh(geometry, material);
    }

    function createGoal(goalDepth = 2, goalWidth = 8, goalHeight = 4, postThickness = 0.3) {
        const goal = new THREE.Group();

        const leftPost = createGoalPost(postThickness, goalHeight, postThickness);
        leftPost.position.set(0, goalHeight / 2, -goalWidth / 2 + postThickness / 2);
        goal.add(leftPost);

        const rightPost = createGoalPost(postThickness, goalHeight, postThickness);
        rightPost.position.set(0, goalHeight / 2, goalWidth / 2 - postThickness / 2);
        goal.add(rightPost);

        const crossbar = createGoalPost(postThickness, postThickness, goalWidth);
        crossbar.position.set(0, goalHeight - postThickness / 2, 0);
        crossbar.rotation.x = Math.PI / 2; // Döndürerek üst direk yap
        goal.add(crossbar);
        
        // Basit bir ağ görünümü için arka direkler ve üst arka direk (isteğe bağlı)
        // Kalenin derinliğini belirten arka yapı
        const backLeftPost = createGoalPost(postThickness, goalHeight, postThickness);
        backLeftPost.position.set(-goalDepth + postThickness/2, goalHeight / 2, -goalWidth / 2 + postThickness / 2);
        goal.add(backLeftPost);

        const backRightPost = createGoalPost(postThickness, goalHeight, postThickness);
        backRightPost.position.set(-goalDepth + postThickness/2, goalHeight / 2, goalWidth / 2 - postThickness / 2);
        goal.add(backRightPost);
        
        const backCrossbar = createGoalPost(postThickness, postThickness, goalWidth);
        backCrossbar.position.set(-goalDepth + postThickness/2, goalHeight - postThickness / 2, 0);
        backCrossbar.rotation.x = Math.PI / 2;
        goal.add(backCrossbar);


        // İsteğe bağlı: Üst direkleri birleştiren çubuklar
        const topConnector1 = createGoalPost(goalDepth, postThickness, postThickness);
        topConnector1.position.set(-goalDepth/2, goalHeight-postThickness/2, -goalWidth/2 + postThickness/2);
        topConnector1.rotation.z = Math.PI / 2;
        goal.add(topConnector1);

        const topConnector2 = createGoalPost(goalDepth, postThickness, postThickness);
        topConnector2.position.set(-goalDepth/2, goalHeight-postThickness/2, goalWidth/2 - postThickness/2);
        topConnector2.rotation.z = Math.PI / 2;
        goal.add(topConnector2);


        return goal;
    }


    function init() {
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
      camera.position.set(0, 10, 20); // Kamerayı biraz daha yukarı ve geriye aldım
      camera.lookAt(0,0,0); // Başlangıçta merkeze baksın

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true; // Gölgeleri etkinleştir
      document.body.appendChild(renderer.domElement);

      world = new CANNON.World();
      world.gravity.set(0, -9.82, 0);
      world.broadphase = new CANNON.SAPBroadphase(world); // Performans için broadphase algoritması
      world.allowSleep = true; // Uyuyan cisimler için optimizasyon


      const ambient = new THREE.AmbientLight(0xffffff, 0.7); // Ortam ışığını biraz artırdım
      scene.add(ambient);
      const dirLight = new THREE.DirectionalLight(0xffffff, 0.8); // Yönlü ışığı biraz artırdım
      dirLight.position.set(10, 20, 15); // Işık pozisyonunu ayarladım
      dirLight.castShadow = true; // Işığın gölge oluşturmasını sağla
      dirLight.shadow.mapSize.width = 1024;
      dirLight.shadow.mapSize.height = 1024;
      scene.add(dirLight);

      const groundMaterial = new CANNON.Material("groundMaterial");
      const groundShape = new CANNON.Plane();
      const groundBody = new CANNON.Body({ mass: 0, material: groundMaterial });
      groundBody.addShape(groundShape);
      groundBody.quaternion.setFromEuler(-Math.PI/2, 0, 0);
      world.addBody(groundBody);

      const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(50, 30), // Saha boyutları
        new THREE.MeshStandardMaterial({ color: 0x228B22 }) // Çim rengi
      );
      ground.rotation.x = -Math.PI/2;
      ground.receiveShadow = true; // Zemin gölge alsın
      scene.add(ground);

      // Kaleleri oluştur ve sahneye ekle
      const goal1 = createGoal();
      goal1.position.set(-GOAL_LINE_X -1, 0, 0); // AI'nin kalesi (biraz çizginin gerisinde)
      scene.add(goal1);

      const goal2 = createGoal();
      goal2.position.set(GOAL_LINE_X +1, 0, 0); // Oyuncunun kalesi
      goal2.rotation.y = Math.PI; // Kaleyi diğer tarafa döndür
      scene.add(goal2);


      const playerMaterial = new CANNON.Material("playerMaterial");
      player = createPlayer(-10, 1, 0, 0x0000ff, playerMaterial); // Oyuncuya materyal ekledim
      player.mesh.castShadow = true;

      const aiMaterial = new CANNON.Material("aiMaterial");
      ai = createPlayer(10, 1, 0, 0xff0000, aiMaterial); // AI'ye materyal ekledim
      ai.mesh.castShadow = true;


      const ballMaterial = new CANNON.Material("ballMaterial");
      const ballShape = new CANNON.Sphere(0.5);
      ball = new CANNON.Body({ mass: 1, shape: ballShape, material: ballMaterial });
      ball.position.set(0, 0.5, 0);
      ball.linearDamping = 0.1; // Topun yavaşlaması için
      ball.angularDamping = 0.1;
      world.addBody(ball);

      const ballMesh = new THREE.Mesh(
        new THREE.SphereGeometry(0.5, 32, 32),
        new THREE.MeshStandardMaterial({ color: 0xffffff })
      );
      ballMesh.castShadow = true; // Top gölge oluştursun
      ball.mesh = ballMesh;
      scene.add(ballMesh);
      
      // Materyaller arası temas özellikleri (sürtünme, sekme vb.)
      const groundPlayerContact = new CANNON.ContactMaterial(groundMaterial, playerMaterial, { friction: 0.3, restitution: 0.1 });
      world.addContactMaterial(groundPlayerContact);
      const groundAiContact = new CANNON.ContactMaterial(groundMaterial, aiMaterial, { friction: 0.3, restitution: 0.1 });
      world.addContactMaterial(groundAiContact);
      const groundBallContact = new CANNON.ContactMaterial(groundMaterial, ballMaterial, { friction: 0.4, restitution: 0.7 }); // Top daha çok seksin
      world.addContactMaterial(groundBallContact);
      const playerBallContact = new CANNON.ContactMaterial(playerMaterial, ballMaterial, { friction: 0.1, restitution: 0.5 });
      world.addContactMaterial(playerBallContact);
       const aiBallContact = new CANNON.ContactMaterial(aiMaterial, ballMaterial, { friction: 0.1, restitution: 0.5 });
      world.addContactMaterial(aiBallContact);

    }

    function createPlayer(x, y, z, color, material) {
      const shape = new CANNON.Sphere(1);
      const body = new CANNON.Body({ mass: 70, shape, material: material }); // Oyunculara kütle verdim
      body.position.set(x, y, z);
      body.linearDamping = 0.9; // Oyuncuların kaymasını azaltmak için
      world.addBody(body);

      const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(1, 16, 16),
        new THREE.MeshStandardMaterial({ color })
      );
      body.mesh = mesh; // Cannon body'sine Three.js mesh'ini bağla
      scene.add(mesh);
      return body;
    }
    
    let playerSpeed = 0.2;
    let aiSpeedFactor = 0.025; // AI hızını biraz daha ayarlanabilir yaptım

    function animate() {
      animationId = requestAnimationFrame(animate);
      
      const force = new CANNON.Vec3();
      const playerMoveSpeed = 200; // Oyuncunun hareket kuvveti

      if (move.left) force.x -= playerMoveSpeed;
      if (move.right) force.x += playerMoveSpeed;
      if (move.forward) force.z -= playerMoveSpeed; // Z ekseninde ileri
      // Geri hareket de eklenebilir: if (move.backward) force.z += playerMoveSpeed;

      // Kuvveti doğrudan uygulamak yerine, oyuncunun hızını kontrol etmek daha iyi olabilir
      // Ama basitlik için şimdilik kuvvet uygulayalım.
      // player.applyForce(force, player.position); 
      // Daha kontrollü hareket:
      const currentVel = player.velocity;
      const targetVel = new CANNON.Vec3();
      if (move.left) targetVel.x -= playerSpeed;
      if (move.right) targetVel.x += playerSpeed;
      if (move.forward) targetVel.z -= playerSpeed;
      // Oyuncunun mevcut hızını yavaşça hedefe doğru değiştir
      player.velocity.x = THREE.MathUtils.lerp(currentVel.x, targetVel.x, 0.1);
      player.velocity.z = THREE.MathUtils.lerp(currentVel.z, targetVel.z, 0.1);


      // Basit AI Hareketi
      const dx = ball.position.x - ai.position.x;
      const dz = ball.position.z - ai.position.z;
      const distanceToBall = Math.sqrt(dx*dx + dz*dz);
      
      if (distanceToBall > 0.5) { // Topa çok yakınsa durması için bir eşik
        ai.velocity.x = THREE.MathUtils.lerp(ai.velocity.x, dx * aiSpeedFactor * 20, 0.05); // AI hızı için yumuşak geçiş
        ai.velocity.z = THREE.MathUtils.lerp(ai.velocity.z, dz * aiSpeedFactor * 20, 0.05);
      } else {
        ai.velocity.x = THREE.MathUtils.lerp(ai.velocity.x, 0, 0.1);
        ai.velocity.z = THREE.MathUtils.lerp(ai.velocity.z, 0, 0.1);
      }


      world.step(1/60);

      // Mesh pozisyonlarını Cannon body pozisyonlarına eşitle
      player.mesh.position.copy(player.position);
      player.mesh.quaternion.copy(player.quaternion); // Dönmeleri de senkronize et
      ai.mesh.position.copy(ai.position);
      ai.mesh.quaternion.copy(ai.quaternion);
      ball.mesh.position.copy(ball.position);
      ball.mesh.quaternion.copy(ball.quaternion);

      // Kamera oyuncuyu takip etsin
      camera.position.x = player.position.x;
      camera.position.z = player.position.z + 15; // Oyuncunun biraz gerisinden takip et
      camera.lookAt(player.mesh.position); // Oyuncuya baksın

      checkGoal();
      renderer.render(scene, camera);
    }

    function checkGoal() {
      // Gol çizgilerini sabit bir değere bağladım
      if (ball.position.x < -GOAL_LINE_X && Math.abs(ball.position.z) < 4 && ball.position.y < 4) { // AI Gol attı (Oyuncunun Kalesi)
        score.ai++;
        resetPositionsAfterGoal(true); // true: AI gol attı
        updateScore();
      } else if (ball.position.x > GOAL_LINE_X && Math.abs(ball.position.z) < 4 && ball.position.y < 4) { // Oyuncu Gol attı (AI'nin Kalesi)
        score.player++;
        resetPositionsAfterGoal(false); // false: Oyuncu gol attı
        updateScore();
      }
    }

    function resetPositionsAfterGoal(aiScored) {
      ball.velocity.set(0,0,0); // Topun hızını sıfırla
      ball.angularVelocity.set(0,0,0); // Topun dönüş hızını sıfırla
      ball.position.set(0, 2, 0); // Topu ortaya ve biraz yukarı koy

      player.velocity.set(0,0,0);
      player.angularVelocity.set(0,0,0);
      ai.velocity.set(0,0,0);
      ai.angularVelocity.set(0,0,0);

      if (aiScored) { // AI gol attıysa, oyuncu başlar
          player.position.set(-2, 1, 0);
          ai.position.set(10, 1, 0);
      } else { // Oyuncu gol attıysa, AI başlar
          player.position.set(-10, 1, 0);
          ai.position.set(2, 1, 0);
      }
    }
    
    function updateScore() {
      document.getElementById('score').textContent = `Sen: ${score.player} - AI: ${score.ai}`;
    }

    function startTimer() {
      timeLeft = 60; // Süreyi sıfırla
      document.getElementById('clock').textContent = timeLeft;
      const interval = setInterval(() => {
        timeLeft--;
        document.getElementById('clock').textContent = timeLeft;
        if (timeLeft <= 0) {
          clearInterval(interval);
          if (animationId) cancelAnimationFrame(animationId); // Animasyonu durdur
          endGame();
        }
      }, 1000);
    }

    function endGame() {
      document.getElementById('gameover').classList.remove('hidden');
      const result = score.player > score.ai ? "Kazandın!" : score.player < score.ai ? "Kaybettin!" : "Berabere!";
      document.getElementById('result').textContent = result;
    }

    window.move = move; // global scope'a taşı
    window.kickBall = () => {
      if(ball.position.distanceTo(player.position) < 1.8) { // Oyuncu topa yeterince yakınsa şut çeksin
          const direction = new CANNON.Vec3();
          ball.position.vsub(player.position, direction); // Oyuncudan topa doğru yön
          direction.normalize();
          direction.y = 0.2; // Topa biraz yükseklik ver
          direction.scale(25, direction); // Şut gücü (impulse olduğu için kütle ile orantılı)
          
          ball.applyImpulse(direction, player.position); // Oyuncunun pozisyonundan itme uygula
      }
    }

    // Pencere yeniden boyutlandırıldığında kamerayı ve renderer'ı ayarla
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }, false);

  </script>
</body>
</html>
