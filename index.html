<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Futbol Oyunu</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }
    canvas {
      display: block;
    }
    #overlay, #gameover {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    #overlay.hidden, #gameover.hidden {
      display: none;
    }
    #score, #clock {
      position: absolute;
      top: 10px;
      background: rgba(0,0,0,0.5);
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 18px;
      color: #fff;
      z-index: 5;
    }
    #score { left: 10px; }
    #clock { right: 10px; }
    button {
      padding: 12px 24px;
      font-size: 18px;
      border-radius: 10px;
      background-color: #ffffff;
      color: #000;
      border: none;
      cursor: pointer;
    }
    #mobile-controls {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
      z-index: 10;
    }
    .circle {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: white;
      color: black;
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div id="overlay">
    <h1>3D Futbol Oyunu</h1>
    <button id="startBtn">Oyuna Başla</button>
  </div>
  <div id="gameover" class="hidden">
    <h1>Oyun Bitti</h1>
    <p id="result"></p>
    <button onclick="window.location.reload()">Tekrar Oyna</button>
  </div>
  <div id="score">Sen: 0 - AI: 0</div>
  <div id="clock">60</div>
  <div id="mobile-controls">
    <div class="circle" ontouchstart="move.left=true" ontouchend="move.left=false">⯇</div>
    <div class="circle" ontouchstart="move.right=true" ontouchend="move.right=false">⯈</div>
    <div class="circle" ontouchstart="move.forward=true" ontouchend="move.forward=false">▲</div>
    <div class="circle" ontouchstart="kickBall()">⚽</div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three';
    import * as CANNON from 'https://cdn.skypack.dev/cannon-es';

    let scene, camera, renderer, world;
    let player, ai, ball;
    let score = { player: 0, ai: 0 };
    let timeLeft = 60;
    let move = { left: false, right: false, forward: false };
    let animationId;

    document.getElementById('startBtn').addEventListener('click', () => {
      document.getElementById('overlay').classList.add('hidden');
      init();
      animate();
      startTimer();
    });

    function init() {
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
      camera.position.set(0, 5, 15);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      world = new CANNON.World();
      world.gravity.set(0, -9.82, 0);

      const ambient = new THREE.AmbientLight(0xffffff, 0.6);
      scene.add(ambient);
      const dirLight = new THREE.DirectionalLight(0xffffff, 1);
      dirLight.position.set(10, 10, 10);
      scene.add(dirLight);

      const groundShape = new CANNON.Plane();
      const groundBody = new CANNON.Body({ mass: 0 });
      groundBody.addShape(groundShape);
      groundBody.quaternion.setFromEuler(-Math.PI/2, 0, 0);
      world.addBody(groundBody);

      const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(50, 30),
        new THREE.MeshStandardMaterial({ color: 0x228B22 })
      );
      ground.rotation.x = -Math.PI/2;
      scene.add(ground);

      player = createPlayer(-10, 1, 0, 0x0000ff);
      ai = createPlayer(10, 1, 0, 0xff0000);

      const ballShape = new CANNON.Sphere(0.5);
      ball = new CANNON.Body({ mass: 1, shape: ballShape });
      ball.position.set(0, 0.5, 0);
      world.addBody(ball);

      const ballMesh = new THREE.Mesh(
        new THREE.SphereGeometry(0.5, 32, 32),
        new THREE.MeshStandardMaterial({ color: 0xffffff })
      );
      ball.mesh = ballMesh;
      scene.add(ballMesh);
    }

    function createPlayer(x, y, z, color) {
      const shape = new CANNON.Sphere(1);
      const body = new CANNON.Body({ mass: 1, shape });
      body.position.set(x, y, z);
      world.addBody(body);

      const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(1, 16, 16),
        new THREE.MeshStandardMaterial({ color })
      );
      body.mesh = mesh;
      scene.add(mesh);
      return body;
    }

    function animate() {
      animationId = requestAnimationFrame(animate);
      if (move.left) player.position.x -= 0.2;
      if (move.right) player.position.x += 0.2;
      if (move.forward) player.position.z -= 0.2;

      const dx = ball.position.x - ai.position.x;
      const dz = ball.position.z - ai.position.z;
      ai.position.x += dx * 0.02;
      ai.position.z += dz * 0.02;

      world.step(1/60);

      [player, ai, ball].forEach(body => {
        body.mesh.position.copy(body.position);
      });

      camera.lookAt(player.position);
      checkGoal();

      renderer.render(scene, camera);
    }

    function checkGoal() {
      if (ball.position.x < -24) {
        score.ai++;
        resetPositions();
        updateScore();
      } else if (ball.position.x > 24) {
        score.player++;
        resetPositions();
        updateScore();
      }
    }

    function resetPositions() {
      ball.position.set(0, 0.5, 0);
      player.position.set(-10, 1, 0);
      ai.position.set(10, 1, 0);
    }

    function updateScore() {
      document.getElementById('score').textContent = `Sen: ${score.player} - AI: ${score.ai}`;
    }

    function startTimer() {
      const interval = setInterval(() => {
        timeLeft--;
        document.getElementById('clock').textContent = timeLeft;
        if (timeLeft <= 0) {
          clearInterval(interval);
          cancelAnimationFrame(animationId);
          endGame();
        }
      }, 1000);
    }

    function endGame() {
      document.getElementById('gameover').classList.remove('hidden');
      const result = score.player > score.ai ? "Kazandın!" : score.player < score.ai ? "Kaybettin!" : "Berabere!";
      document.getElementById('result').textContent = result;
    }

    window.move = move;
    window.kickBall = () => {
      const dir = ball.position.vsub(player.position);
      dir.normalize();
      dir.scale(5, dir);
      ball.applyImpulse(dir, ball.position);
    }
  </script>
</body>
</html>
