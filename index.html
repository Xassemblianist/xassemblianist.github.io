<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Futbol Oyunu</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
    }
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background-color: #111;
    }
    #login-screen input {
      padding: 10px;
      font-size: 16px;
      margin: 10px;
    }
    #login-screen button {
      padding: 10px 20px;
      font-size: 18px;
      cursor: pointer;
    }
    #game-ui {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    #scoreboard {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.6);
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 20px;
    }
    canvas {
      display: block;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r148/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.148.0/examples/js/controls/PointerLockControls.js"></script>
</head>
<body>
  <div id="login-screen">
    <h1>3D Futbol Oyunu</h1>
    <input type="text" id="username" placeholder="Kullanıcı adınızı girin" />
    <button id="start-btn">Oyuna Başla</button>
  </div>

  <div id="game-ui" style="display:none">
    <div id="scoreboard">
      <span id="teamA">Sen: 0</span> |
      <span id="teamB">AI: 0</span>
    </div>
    <canvas id="game-canvas"></canvas>
  </div>

  <script>
    let scene, camera, renderer;
    let player, ball, aiPlayer;
    let scoreA = 0, scoreB = 0;

    document.getElementById('start-btn').addEventListener('click', () => {
      const name = document.getElementById('username').value.trim();
      if (!name) return alert("Lütfen kullanıcı adınızı girin.");
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('game-ui').style.display = 'block';
      init();
      animate();
    });

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x1a1a1a);

      camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
      camera.position.set(0, 15, 30);

      renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('game-canvas') });
      renderer.setSize(window.innerWidth, window.innerHeight);

      const light = new THREE.DirectionalLight(0xffffff, 1);
      light.position.set(10, 20, 10);
      scene.add(light);

      const field = new THREE.Mesh(
        new THREE.PlaneGeometry(60, 40),
        new THREE.MeshStandardMaterial({ color: 0x228B22 })
      );
      field.rotation.x = -Math.PI / 2;
      scene.add(field);

      player = new THREE.Mesh(
        new THREE.BoxGeometry(2, 2, 2),
        new THREE.MeshStandardMaterial({ color: 0x00ff00 })
      );
      player.position.set(-10, 1, 0);
      scene.add(player);

      aiPlayer = new THREE.Mesh(
        new THREE.BoxGeometry(2, 2, 2),
        new THREE.MeshStandardMaterial({ color: 0xff0000 })
      );
      aiPlayer.position.set(10, 1, 0);
      scene.add(aiPlayer);

      ball = new THREE.Mesh(
        new THREE.SphereGeometry(1, 32, 32),
        new THREE.MeshStandardMaterial({ color: 0xffffff })
      );
      ball.position.set(0, 1, 0);
      scene.add(ball);

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    }

    function animate() {
      requestAnimationFrame(animate);

      const dist = player.position.distanceTo(ball.position);
      if (dist < 2) ball.position.x += 0.5; // şut

      const aiDist = aiPlayer.position.distanceTo(ball.position);
      if (aiDist > 1) {
        const dx = ball.position.x - aiPlayer.position.x;
        const dz = ball.position.z - aiPlayer.position.z;
        aiPlayer.position.x += dx * 0.02;
        aiPlayer.position.z += dz * 0.02;
      } else {
        ball.position.x -= 0.5; // AI şut
      }

      camera.lookAt(player.position);
      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
