<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Futbol Oyunu</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
    }
    #login-screen, #settings-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background-color: #111;
    }
    input, button, select {
      padding: 10px;
      font-size: 16px;
      margin: 10px;
    }
    #game-ui {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    #scoreboard {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.6);
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 20px;
    }
    #controls {
      position: absolute;
      bottom: 20px;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 10px;
    }
    .control-btn {
      padding: 10px 20px;
      font-size: 16px;
    }
    canvas {
      display: block;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r148/three.min.js"></script>
</head>
<body>
  <div id="login-screen">
    <h1>3D Futbol Oyunu</h1>
    <input type="text" id="username" placeholder="Kullanıcı adınızı girin" />
    <select id="team-select">
      <option value="green">Yeşil Takım</option>
      <option value="blue">Mavi Takım</option>
    </select>
    <button onclick="showSettings()">Ayarlar</button>
  </div>

  <div id="settings-screen" style="display:none">
    <h2>Ayarlar</h2>
    <label>Maç Süresi: <input type="number" id="match-time" value="60" /> saniye</label>
    <label>Zorluk:
      <select id="difficulty">
        <option value="easy">Kolay</option>
        <option value="medium">Orta</option>
        <option value="hard">Zor</option>
      </select>
    </label>
    <button onclick="startGame()">Oyuna Başla</button>
  </div>

  <div id="game-ui" style="display:none">
    <div id="scoreboard">
      <span id="teamA">Sen: 0</span> |
      <span id="teamB">AI: 0</span>
      <span id="timer"></span>
    </div>
    <div id="controls">
      <button class="control-btn" onclick="playerMove(-1)">⬅</button>
      <button class="control-btn" onclick="playerKick()">Şut</button>
      <button class="control-btn" onclick="playerMove(1)">➡</button>
    </div>
    <canvas id="game-canvas"></canvas>
  </div>

  <script>
    let scene, camera, renderer;
    let player, ball, aiPlayer;
    let scoreA = 0, scoreB = 0;
    let matchDuration = 60;
    let difficulty = 'medium';
    let timeLeft = 0;
    let timerInterval;

    function showSettings() {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('settings-screen').style.display = 'flex';
    }

    function startGame() {
      matchDuration = parseInt(document.getElementById('match-time').value);
      difficulty = document.getElementById('difficulty').value;
      document.getElementById('settings-screen').style.display = 'none';
      document.getElementById('game-ui').style.display = 'block';
      init();
      startTimer();
      animate();
    }

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x1a1a1a);

      camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
      camera.position.set(0, 20, 35);

      renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('game-canvas') });
      renderer.setSize(window.innerWidth, window.innerHeight);

      const light = new THREE.DirectionalLight(0xffffff, 1);
      light.position.set(10, 20, 10);
      scene.add(light);

      const field = new THREE.Mesh(
        new THREE.PlaneGeometry(60, 40),
        new THREE.MeshStandardMaterial({ color: 0x228B22 })
      );
      field.rotation.x = -Math.PI / 2;
      scene.add(field);

      const lines = new THREE.GridHelper(60, 30, 0xffffff, 0xffffff);
      lines.rotation.x = Math.PI / 2;
      scene.add(lines);

      const goal1 = new THREE.Mesh(
        new THREE.BoxGeometry(2, 4, 0.5),
        new THREE.MeshStandardMaterial({ color: 0xffffff })
      );
      goal1.position.set(-29, 2, 0);
      scene.add(goal1);

      const goal2 = goal1.clone();
      goal2.position.set(29, 2, 0);
      scene.add(goal2);

      const tribunes = new THREE.Mesh(
        new THREE.BoxGeometry(70, 10, 50),
        new THREE.MeshStandardMaterial({ color: 0x333333, wireframe: false })
      );
      tribunes.position.set(0, -5, 0);
      scene.add(tribunes);

      player = new THREE.Mesh(
        new THREE.CylinderGeometry(0.8, 0.8, 2, 32),
        new THREE.MeshStandardMaterial({ color: 0x00ff00 })
      );
      player.position.set(-10, 1, 0);
      scene.add(player);

      aiPlayer = new THREE.Mesh(
        new THREE.CylinderGeometry(0.8, 0.8, 2, 32),
        new THREE.MeshStandardMaterial({ color: 0xff0000 })
      );
      aiPlayer.position.set(10, 1, 0);
      scene.add(aiPlayer);

      ball = new THREE.Mesh(
        new THREE.SphereGeometry(1, 32, 32),
        new THREE.MeshStandardMaterial({ color: 0xffffff })
      );
      ball.position.set(0, 1, 0);
      scene.add(ball);

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    }

    function animate() {
      requestAnimationFrame(animate);

      const dist = player.position.distanceTo(ball.position);
      if (dist < 2) ball.position.x += 0.3;

      const aiSpeed = difficulty === 'hard' ? 0.05 : difficulty === 'medium' ? 0.03 : 0.01;
      const dx = ball.position.x - aiPlayer.position.x;
      const dz = ball.position.z - aiPlayer.position.z;
      const aiDist = aiPlayer.position.distanceTo(ball.position);
      if (aiDist > 1) {
        aiPlayer.position.x += dx * aiSpeed;
        aiPlayer.position.z += dz * aiSpeed;
      } else {
        ball.position.x -= 0.3;
      }

      camera.lookAt(player.position);
      renderer.render(scene, camera);
    }

    function startTimer() {
      timeLeft = matchDuration;
      timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById("timer").textContent = ` | Süre: ${timeLeft}s`;
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          alert(scoreA > scoreB ? "Kazandınız!" : scoreA < scoreB ? "Kaybettiniz!" : "Berabere!");
          location.reload();
        }
      }, 1000);
    }

    function playerMove(dir) {
      player.position.x += dir * 1;
    }

    function playerKick() {
      const dist = player.position.distanceTo(ball.position);
      if (dist < 2) ball.position.x += 1;
    }
  </script>
</body>
</html>
