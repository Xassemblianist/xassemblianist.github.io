<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kütüphane Yükleme ve Buton Testi</title>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: Arial, sans-serif; }
        canvas { display: block; } /* Bu oyunda canvas olmayacak ama stil kalabilir */
        #overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.8); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; text-align: center;}
        button { padding: 12px 24px; font-size: 18px; border-radius: 10px; background-color: #ffffff; color: #000; border: none; cursor: pointer; margin-top: 20px;}
    </style>
</head>
<body>
    <div id="overlay">
        <h1>Kütüphane ve Buton Testi</h1>
        <p>Lütfen çıkan uyarı mesajlarını takip et.</p>
        <button id="startBtn">Test Butonu</button>
    </div>

    <script type="module">
        // ADIM A: Script çalışmaya başladı mı?
        alert("ADIM A: Script çalışmaya başladı.");

        try {
            // ADIM B_oncesi: Kütüphaneler import edilmeye çalışılıyor.
            alert("ADIM B_oncesi: Kütüphaneler (THREE.js, CANNON.js) şimdi import edilecek. Bu adımdan sonra bir 'ADIM B' mesajı görmezseniz, import sırasında sorun olmuş olabilir (tarayıcı konsolunda hata olurdu).");

            import * as THREE from 'https://cdn.skypack.dev/three';
            import * as CANNON from 'https://cdn.skypack.dev/cannon-es';

            // ADIM B: Kütüphaneler yüklendi ve tanımlı mı?
            // Bu blok, importlar başarılı olursa çalışır.
            if (typeof THREE === 'undefined' || typeof CANNON === 'undefined') {
                alert("ADIM B - HATA: Kütüphaneler yüklendi AMA TANIMSIZ görünüyor (THREE veya CANNON 'undefined'). Bu beklenmedik bir durum.");
            } else {
                alert("ADIM B - BAŞARILI: Kütüphaneler (THREE, CANNON) başarıyla import edildi ve tanımlı.");
            }
        } catch (e) {
            // Statik import'lar doğrudan try-catch ile yakalanamaz.
            // Bu catch bloğu genellikle çalışmaz, import hatası olursa script burada durabilir
            // ve tarayıcı konsoluna hata yazar. Ama yine de bir kontrol.
            alert("ADIM B - KRİTİK IMPORT YAKALAMA HATASI (Beklenmedik): " + e.message);
        }

        const btn = document.getElementById('startBtn');
        const overlayDiv = document.getElementById('overlay');

        if (btn && overlayDiv) {
            // ADIM C: Buton bulundu mu?
            alert("ADIM C: 'Test Butonu' bulundu.");

            btn.addEventListener('click', function() {
                // ADIM D: Butona tıklandı mı?
                alert("ADIM D: 'Test Butonu'na tıklandı!");
                
                overlayDiv.innerHTML = '<h1>Test Başarılı!</h1><p>Buton çalıştı ve kütüphaneler de muhtemelen yüklendi (ADIM B mesajına göre).</p>';
                overlayDiv.style.backgroundColor = 'rgba(0, 80, 0, 0.8)'; // Koyu yeşil
            });
        } else {
            alert("ADIM C - HATA: 'Test Butonu' (startBtn) veya 'overlay' HTML'de bulunamadı.");
        }

        // ADIM E: Script'in sonuna ulaşıldı mı?
        alert("ADIM E: Test scriptinin sonuna ulaşıldı.");
    </script>
</body>
</html>
