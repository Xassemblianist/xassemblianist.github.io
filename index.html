<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Deluxe Navbar</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <script>
    tailwind.config = {
      darkMode: 'class'
    }
  </script>
</head>
<body class="bg-gradient-to-br from-gray-100 to-white dark:from-gray-900 dark:to-black transition duration-500" id="page">

  <!-- Navbar -->
  <nav class="animate__animated animate__fadeInDown sticky top-0 z-50 backdrop-blur-xl bg-white/70 dark:bg-gray-800/60 border-b border-gray-200 dark:border-gray-700 shadow-md">
    <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
      
      <!-- Logo -->
      <div class="flex items-center gap-3">
        <img src="https://via.placeholder.com/36" class="rounded-full w-9 h-9">
        <span class="text-xl font-bold text-gray-800 dark:text-white tracking-wide">DeluxeNav</span>
      </div>

      <!-- Menu -->
      <ul class="hidden md:flex items-center gap-6 text-gray-700 dark:text-gray-300 text-sm font-medium">
        <li class="group relative">
          <a href="#" class="hover:text-blue-600 dark:hover:text-blue-400 transition-all">
            Anasayfa
            <span class="absolute bottom-0 left-0 w-0 group-hover:w-full h-0.5 bg-blue-600 dark:bg-blue-400 transition-all duration-300"></span>
          </a>
        </li>
        <li class="group relative">
          <a href="#" class="hover:text-blue-600 dark:hover:text-blue-400 transition-all">Hizmetler</a>
          <ul class="absolute top-full left-0 mt-2 w-40 bg-white dark:bg-gray-800 shadow-xl rounded-md hidden group-hover:block z-20 animate__animated animate__fadeIn">
            <li><a href="#" class="block px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700">Web Tasarımı</a></li>
            <li><a href="#" class="block px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700">SEO</a></li>
            <li><a href="#" class="block px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700">Danışmanlık</a></li>
          </ul>
        </li>
        <li><a href="#" class="hover:text-blue-600 dark:hover:text-blue-400 transition">Blog</a></li>
        <li><a href="#" class="hover:text-blue-600 dark:hover:text-blue-400 transition">İletişim</a></li>

        <!-- Dil -->
        <li class="relative group">
          <a href="#" class="hover:text-blue-600 dark:hover:text-blue-400">Dil</a>
          <ul class="absolute left-0 top-full mt-2 bg-white dark:bg-gray-800 shadow rounded hidden group-hover:block animate__animated animate__fadeIn">
            <li><a href="#" class="block px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700">Türkçe</a></li>
            <li><a href="#" class="block px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700">English</a></li>
          </ul>
        </li>
      </ul>

      <!-- Sağ Kısım -->
      <div class="flex items-center gap-3">
        <!-- Dark Mode -->
        <button id="toggleDark" class="text-gray-700 dark:text-yellow-300 transition-all">
          <svg id="moon" class="w-6 h-6 hidden dark:inline" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/>
          </svg>
          <svg id="sun" class="w-6 h-6 dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path d="M12 3v2m0 14v2m9-9h-2M5 12H3m16.24 4.24l-1.42-1.42M7.76 7.76L6.34 6.34m0 11.32l1.42-1.42m10.48-10.48l-1.42 1.42"/>
          </svg>
        </button>

        <!-- Giriş Kayıt -->
        <a href="#" class="text-sm px-3 py-1 rounded hover:bg-blue-100 dark:hover:bg-gray-700">Giriş</a>
        <a href="#" class="text-sm px-3 py-1 bg-blue-600 text-white rounded hover:bg-blue-700 transition">Kayıt Ol</a>

        <!-- Hamburger -->
        <button class="md:hidden" id="menu-toggle">
          <svg class="w-6 h-6 text-gray-800 dark:text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Mobile Menu -->
    <div class="md:hidden hidden px-4 pb-4 animate__animated animate__fadeInDown" id="mobile-menu">
      <ul class="flex flex-col gap-2 mt-3 text-gray-700 dark:text-gray-200">
        <li><a href="#" class="block px-4 py-2 rounded hover:bg-gray-100 dark:hover:bg-gray-700">Anasayfa</a></li>
        <li><a href="#" class="block px-4 py-2">Hizmetler</a></li>
        <li><a href="#" class="block px-4 py-2">Blog</a></li>
        <li><a href="#" class="block px-4 py-2">İletişim</a></li>
        <li><a href="#" class="block px-4 py-2">Dil: Türkçe</a></li>
        <li><a href="#" class="block px-4 py-2">Giriş</a></li>
        <li><a href="#" class="block px-4 py-2 bg-blue-600 text-white rounded text-center">Kayıt Ol</a></li>
      </ul>
    </div>
  </nav>

  <script>
    const darkToggle = document.getElementById('toggleDark');
    const html = document.getElementById('page');
    darkToggle.addEventListener('click', () => {
      html.classList.toggle('dark');
    });

    const menuBtn = document.getElementById('menu-toggle');
    const mobileMenu = document.getElementById('mobile-menu');
    menuBtn.addEventListener('click', () => {
      mobileMenu.classList.toggle('hidden');
    });
  </script>

</body>
</html>
